name: ExamEve
options:
  bundleIdPrefix: com.exameve
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  ExamEve:
    type: application
    platform: iOS
    sources:
      - ExamEve
    dependencies:
      - package: Supabase
        product: Supabase
    configFiles:
      Debug: ExamEve/Secrets.xcconfig
      Release: ExamEve/Secrets.xcconfig
    info:
      path: ExamEve/Info.plist
      properties:
        CFBundleDisplayName: 시험전야
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        SupabaseURL: $(SUPABASE_URL)
        SupabaseKey: $(SUPABASE_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.exameve.app
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
